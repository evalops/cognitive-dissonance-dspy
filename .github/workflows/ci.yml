name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv pip install --system -e '.[dev]'

      - name: Lint
        run: python -m ruff check --select F,B,W291,W292,W293,I001,UP006,UP045,UP035,D212,D202,RUF010,UP015,D205,D200,RUF013,PTH123,E722,SIM102,SIM117,SIM105,RUF001,D415,N806,D102,E741,RUF015,RUF059,RUF022 .

      - name: Test
        run: python -m pytest -q

  coq-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python dependencies
        run: uv pip install --system -e '.[dev]'

      - name: Install Coq
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends coq
          coqc --version
          coqchk --version

      - name: Run Coq smoke test
        run: python -m pytest -q tests/test_coq_smoke.py
